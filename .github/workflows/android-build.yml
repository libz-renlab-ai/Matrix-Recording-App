name: Android APK Build

# Build a debug-signed APK on every push to main / any feat branch,
# upload as workflow artifact. User downloads artifact → installs to phone.
#
# Sprint 0 / V0.0.1 design:
#   - We commit only the source files we care about (app/pubspec.yaml,
#     app/lib/main.dart, app/android-manifest-overlay.xml).
#   - CI generates a fresh Flutter scaffold via `flutter create`, then
#     overlays our files. This keeps the repo clean of generated noise.

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Scaffold + overlay Matrix Recording app
        run: |
          set -euo pipefail

          WORK="$RUNNER_TEMP/matrix_scaffold"
          REPO_APP="$GITHUB_WORKSPACE/app"

          echo "::group::Generate Flutter scaffold"
          flutter create \
            --project-name matrix_recording \
            --org com.libzrenlab.matrix \
            --platforms=android \
            --description "Matrix Recording App" \
            "$WORK"
          echo "::endgroup::"

          echo "::group::Overlay our source files"
          cp "$REPO_APP/pubspec.yaml" "$WORK/pubspec.yaml"
          cp "$REPO_APP/lib/main.dart" "$WORK/lib/main.dart"
          echo "::endgroup::"

          echo "::group::Merge AndroidManifest permissions"
          MANIFEST="$WORK/android/app/src/main/AndroidManifest.xml"
          python3 - "$MANIFEST" "$REPO_APP/android-manifest-overlay.xml" <<'PY'
          import re, sys, pathlib

          target = pathlib.Path(sys.argv[1])
          overlay = pathlib.Path(sys.argv[2])

          target_text = target.read_text(encoding="utf-8")
          overlay_text = overlay.read_text(encoding="utf-8")

          perms = re.findall(
              r'<uses-permission[^/]*/>',
              overlay_text,
          )
          # Insert all <uses-permission> lines right after the <manifest> opening tag.
          def inject(match):
              return match.group(0) + "\n    " + "\n    ".join(perms)

          new_text, n = re.subn(
              r'(<manifest[^>]*>)',
              inject,
              target_text,
              count=1,
          )
          if n != 1:
              raise SystemExit("could not find <manifest> opening tag")
          target.write_text(new_text, encoding="utf-8")
          print("injected permissions:", perms)
          PY
          echo "::endgroup::"

          echo "::group::Enable cleartext HTTP (for internal-LAN upload to 192.168.x.x)"
          python3 - "$MANIFEST" <<'PY'
          import re, sys, pathlib
          p = pathlib.Path(sys.argv[1])
          text = p.read_text(encoding="utf-8")
          # Add android:usesCleartextTraffic="true" to <application> if not present.
          if "usesCleartextTraffic" not in text:
              text = re.sub(
                  r"(<application\b)",
                  r'\1 android:usesCleartextTraffic="true"',
                  text,
                  count=1,
              )
              p.write_text(text, encoding="utf-8")
              print("added usesCleartextTraffic to <application>")
          else:
              print("usesCleartextTraffic already present")
          PY
          echo "::endgroup::"

          echo "::group::Pin Android minSdk for record plugin + sign release with debug keystore"
          BUILD_GRADLE="$WORK/android/app/build.gradle.kts"
          IS_KOTLIN_DSL=1
          if [ ! -f "$BUILD_GRADLE" ]; then
            BUILD_GRADLE="$WORK/android/app/build.gradle"
            IS_KOTLIN_DSL=0
          fi
          # record plugin requires Android minSdk >= 21
          sed -i.bak -E \
            -e 's/(minSdk(Version)?\s*=?\s*)[a-zA-Z0-9._]+/\1 21/' \
            -e 's/(minSdk(Version)?\s+)flutter\.minSdkVersion/\121/' \
            "$BUILD_GRADLE"
          # Make sure release builds are signed with the debug keystore so the
          # release APK is installable without setting up a release keystore.
          # Flutter create's recent templates already do this — verify or inject.
          if ! grep -q "signingConfigs.debug\|signingConfigs.getByName" "$BUILD_GRADLE"; then
            echo "release block missing debug signing — injecting"
            python3 - "$BUILD_GRADLE" "$IS_KOTLIN_DSL" <<'PY'
          import re, sys, pathlib
          p = pathlib.Path(sys.argv[1])
          is_kts = sys.argv[2] == "1"
          text = p.read_text(encoding="utf-8")
          sig = ('            signingConfig = signingConfigs.getByName("debug")'
                 if is_kts else
                 '            signingConfig signingConfigs.debug')
          # flutter create always generates a release { } block in buildTypes.
          # Inject signingConfig as the first line inside that block.
          text, n = re.subn(r"(release\s*\{)", r"\1\n" + sig, text, count=1)
          if n != 1:
              raise SystemExit("could not find release { block")
          p.write_text(text, encoding="utf-8")
          print("injected debug signing for release")
          PY
          fi
          grep -i "minSdk\|signingConfig" "$BUILD_GRADLE" || true
          echo "::endgroup::"

          echo "Scaffold ready at: $WORK"
          echo "WORK_DIR=$WORK" >> "$GITHUB_ENV"

      - name: Flutter pub get
        working-directory: ${{ env.WORK_DIR }}
        run: flutter pub get

      - name: Flutter analyze
        working-directory: ${{ env.WORK_DIR }}
        continue-on-error: true
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # Split-per-ABI: produce 3 small APKs (arm64-v8a / armeabi-v7a / x86_64)
      # instead of one fat APK containing all 3. Each split is ~1/3 the size.
      # We skip the fat debug build entirely to save CI time.

      - name: Build release APKs (split per ABI)
        working-directory: ${{ env.WORK_DIR }}
        run: flutter build apk --release --split-per-abi

      - name: Locate APKs
        id: locate
        working-directory: ${{ env.WORK_DIR }}
        run: |
          echo "--- all APKs generated ---"
          ls -lh build/app/outputs/flutter-apk/
          echo ""
          echo "--- arm64 (recommended) ---"
          if [ -f build/app/outputs/flutter-apk/app-arm64-v8a-release.apk ]; then
            ls -lh build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrix-recording-android-${{ github.sha }}
          path: ${{ env.WORK_DIR }}/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Build summary
        run: |
          {
            echo "## Matrix Recording — Android APK build"
            echo ""
            echo "**Commit**: \`${GITHUB_SHA:0:7}\`"
            echo "**Branch**: \`${GITHUB_REF_NAME}\`"
            echo ""
            echo "### Which APK to install"
            echo ""
            echo "**99% of modern Android phones (2017+): \`app-arm64-v8a-release.apk\`** (~17 MB)"
            echo ""
            echo "- Old phones (32-bit ARM): \`app-armeabi-v7a-release.apk\` (~14 MB)"
            echo "- Emulators / x86 tablets: \`app-x86_64-release.apk\` (~18 MB)"
            echo ""
            echo "### How to install"
            echo ""
            echo "1. Scroll to **Artifacts** at the bottom of this workflow run page"
            echo "2. Download \`matrix-recording-android-${GITHUB_SHA:0:7}\` (zip)"
            echo "3. Extract → pick the APK matching your phone's ABI (arm64-v8a is the safe default)"
            echo "4. Transfer to phone (WeChat / email / USB)"
            echo "5. On phone: tap APK → allow install from unknown source → install"
            echo "6. App icon \"matrix_recording\" should appear"
            echo ""
            echo "All APKs are release-mode (optimized AOT, smaller, faster) and signed"
            echo "with the debug keystore for installability."
          } >> "$GITHUB_STEP_SUMMARY"
