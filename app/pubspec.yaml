name: matrix_recording
description: Matrix Recording App — capture meeting audio and (eventually) auto-upload to the analysis pipeline.
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  record: 5.0.5
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  http: ^1.2.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_lints: ^4.0.0

# Pin record_platform_interface below 1.5.0 because record_linux 0.7.2 (transitive
# from record 5.0.5) doesn't implement the new startStream API introduced in 1.5.0.
# We only target Android but Dart compiles all platform impls.
dependency_overrides:
  record_platform_interface: 1.2.0

flutter:
  uses-material-design: true
